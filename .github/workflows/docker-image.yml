name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- LOGIN TO DOCKER HUB ----------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ---------------- BUILD BACKEND IMAGE ----------------
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/langly-backend:latest ./backend

      # ---------------- PUSH BACKEND ----------------
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/langly-backend:latest

      # ---------------- BUILD FRONTEND IMAGE ----------------
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/langly-frontend:latest ./frontend

      # ---------------- PUSH FRONTEND ----------------
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/langly-frontend:latest
