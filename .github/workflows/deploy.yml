name: LanglyAI Deploy (Docker -> EC2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/langlyai-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/langlyai-backend:latest

      - name: Build & push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/langlyai-frontend:latest ./frontend/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/langlyai-frontend:latest

      #  COPY DOCKER COMPOSE TO EC2 (IMPORTANT FIX)
      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/langlyai/"

      #  DEPLOY ON EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p ~/langlyai
            cd ~/langlyai

            echo "Pulling latest images..."
            docker compose -f docker-compose.yml pull

            echo "Restarting containers..."
            docker compose -f docker-compose.yml up -d --remove-orphans

            echo "Cleaning old images..."
            docker image prune -af