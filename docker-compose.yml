services:
  backend:
    image: ${DOCKERHUB_USERNAME}/langlyai-backend:latest
    container_name: langlyai-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ${DOCKERHUB_USERNAME}/langlyai-frontend:latest
    container_name: langlyai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s